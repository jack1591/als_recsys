<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекомендации товаров</title>
    <!-- Bootstrap 5 для быстрого оформления -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .recommendation-card {
            transition: transform 0.2s;
        }
        .recommendation-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .score-badge {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        #error-message {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <div class="header text-center">
        <h1>🔮 Персональные рекомендации</h1>
        <p class="lead">Узнайте, какие товары могут вам понравиться</p>
    </div>

    <!-- Форма запроса -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form id="recommend-form">
                            <div class="mb-3">
                                <label for="user-id" class="form-label">ID пользователя</label>
                                <input type="number" class="form-control" id="user-id"
                                       placeholder="Введите user_id" required min="1">
                                <div class="form-text">Введите идентификатор пользователя из датасета</div>
                            </div>
                            <div class="mb-3">
                                <label for="rec-count" class="form-label">Количество рекомендаций</label>
                                <select class="form-select" id="rec-count">
                                    <option value="5">5</option>
                                    <option value="10" selected>10</option>
                                    <option value="15">15</option>
                                    <option value="20">20</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="submit-btn">
                                <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                                Получить рекомендации
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Сообщение об ошибке -->
        <div id="error-message" class="alert alert-danger mt-4 text-center" role="alert">
            <span id="error-text"></span>
        </div>

        <!-- Карточки с рекомендациями -->
        <div id="results-container" class="row mt-4 g-4">
            <!-- Динамически заполняется через JS -->
        </div>
    </div>

    <script>
        // URL вашего API (измените при необходимости)
        const API_BASE = 'http://localhost:8000';

        const form = document.getElementById('recommend-form');
        const resultsContainer = document.getElementById('results-container');
        const errorDiv = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const spinner = document.getElementById('spinner');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userId = document.getElementById('user-id').value;
            const k = document.getElementById('rec-count').value;

            // Сброс предыдущих результатов и ошибок
            resultsContainer.innerHTML = '';
            errorDiv.style.display = 'none';

            // Показываем спиннер
            spinner.classList.remove('d-none');
            submitBtn.disabled = true;
            submitBtn.querySelector('span:last-child').textContent = ' Загрузка...';

            try {
                const response = await fetch(`${API_BASE}/recommend/${userId}?k=${k}`);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `Ошибка ${response.status}`);
                }

                const data = await response.json();
                displayRecommendations(data);
            } catch (err) {
                showError(err.message);
            } finally {
                spinner.classList.add('d-none');
                submitBtn.disabled = false;
                submitBtn.querySelector('span:last-child').textContent = ' Получить рекомендации';
            }
        });

        function displayRecommendations(data) {
            if (!data.recommendations || data.recommendations.length === 0) {
                showError('Для этого пользователя не найдено рекомендаций');
                return;
            }

            // Очищаем контейнер
            resultsContainer.innerHTML = '';

            // Добавляем заголовок
            const headerRow = document.createElement('div');
            headerRow.className = 'col-12';
            headerRow.innerHTML = `<h3 class="mb-3">Рекомендации для пользователя <span class="text-primary">#${data.user_id}</span></h3>`;
            resultsContainer.appendChild(headerRow);

            // Сортируем по score (по убыванию) – API уже должен возвращать упорядоченный список, но на всякий случай
            const sortedRecs = [...data.recommendations].sort((a, b) => b.score - a.score);

            // Создаём карточки для каждого товара
            sortedRecs.forEach((rec, index) => {
                const col = document.createElement('div');
                col.className = 'col-md-4 col-lg-3';

                col.innerHTML = `
                    <div class="card recommendation-card h-100 shadow-sm position-relative">
                        <span class="badge bg-warning text-dark score-badge">${rec.score.toFixed(3)}</span>
                        <div class="card-body">
                            <h5 class="card-title">#${index + 1} ${escapeHtml(rec.product_name)}</h5>
                            <h6 class="card-subtitle mb-2 text-muted">ID: ${rec.product_id}</h6>
                            <p class="card-text">
                                <small class="text-muted">
                                    ${rec.department ? '📂 ' + escapeHtml(rec.department) : ''}
                                    ${rec.aisle ? ' / ' + escapeHtml(rec.aisle) : ''}
                                </small>
                            </p>
                        </div>
                    </div>
                `;
                resultsContainer.appendChild(col);
            });
        }

        function showError(message) {
            errorText.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Простая защита от XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>

    <!-- Bootstrap JS (для мобильной адаптивности) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
